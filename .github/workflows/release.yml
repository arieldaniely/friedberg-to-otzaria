name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Resolve next version
        id: version
        shell: python
        run: |
          import os
          import re
          import subprocess

          pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
          tags_raw = subprocess.check_output(
              ["git", "tag", "--list", "v*"],
              text=True,
              encoding="utf-8",
          )
          versions = []
          for line in tags_raw.splitlines():
              tag = line.strip()
              match = pattern.match(tag)
              if match:
                  versions.append(tuple(int(part) for part in match.groups()))

          if versions:
              major, minor, patch = max(versions)
              next_tag = f"v{major}.{minor}.{patch + 1}"
          else:
              next_tag = "v0.1.0"

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
              fh.write(f"tag={next_tag}\n")

      - name: Create and push tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Build output
        run: python convert_friedberg.py --source ./פרידברג --output ./output

      - name: Build Sefaria links
        run: python generate_sefaria_links.py --friedberg-dir ./output --output ./output/links --tractate מגילה

      - name: Create zip archive
        shell: python
        run: |
          from pathlib import Path
          import zipfile

          output_dir = Path("output")
          zip_path = Path("הכי גרסינן.zip")

          with zipfile.ZipFile(
              zip_path,
              "w",
              compression=zipfile.ZIP_BZIP2,
              compresslevel=9,
          ) as zf:
              for path in sorted(output_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(output_dir))

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: הכי גרסינן.zip
          generate_release_notes: true
          body: |
            Converted personal-use output package for Otzaria compatibility.

            Original material:
            - https://fjms.genizah.org/index.htm
            - https://pr.genizah.org/

            Rights note:
            - The original content belongs to the original rights holders.
            - This release only republishes a reformatted package intended for personal use.
